<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Make the vendored COLR/SVG "Noto Color Emoji" win for emoji codepoints so the
  PDF header logo + section icons render in COLOR. weasyprint draws this font via
  its SVG table (it cannot draw Debian's CBDT *bitmap* noto package, which is why
  that one is NOT installed). Symbola stays installed as a monochrome fallback for
  any emoji this font lacks.
-->
<fontconfig>
  <match target="pattern">
    <test name="lang" compare="contains"><string>und-zsye</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Noto Color Emoji</string></edit>
  </match>
  <alias binding="strong">
    <family>emoji</family>
    <prefer><family>Noto Color Emoji</family></prefer>
  </alias>
</fontconfig>
